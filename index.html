<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INCREATUZ TV</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Fonni o'zgartirdik: Gradient ko'rinishida */
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        .card { 
            width: 85%; 
            max-width: 350px; 
            text-align: center; 
            background: rgba(255, 255, 255, 0.1); 
            padding: 25px; 
            border-radius: 25px; 
            backdrop-filter: blur(10px); /* Orqa fonni xiralashtirish effekti */
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        .logo { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            margin-bottom: 10px; 
            border: 3px solid #fff; 
            object-fit: cover;
        }
        h1 { font-size: 20px; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #ccc; font-size: 14px; margin-bottom: 20px; font-weight: 300; }
        
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: white; 
            font-weight: 600; 
            font-size: 15px; 
            transition: 0.3s; 
            box-sizing: border-box;
        }
        .btn:active { transform: scale(0.96); }
        
        /* Tugmalar ranglari */
        .yt { background: #cc181e; }
        .ig { background: #e1306c; }
        .fb { background: #4267B2; }
        .tg { background: #0088cc; }
        
        .close-btn { 
            background: transparent; 
            border: 1px solid #555; 
            color: #aaa; 
            margin-top: 15px; 
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="2dd7a3d4-bb8a-4516-a136-97b4abb0018e.png" class="logo" alt="INCREATUZ">
        
        <h1>INCREATUZ TV</h1>
        <p>Ijtimoiy tarmoqlardagi rasmiy sahifalarimizga obuna bo'ling:</p>
        
        <a href="https://www.youtube.com/@increatuztv" class="btn yt" target="_blank">YouTube</a>
        <a href="https://www.instagram.com/increatuztv" class="btn ig" target="_blank">Instagram</a>
        <a href="https://www.facebook.com/people/Increatuz/61582056247533/" class="btn fb" target="_blank">Facebook</a>
        <a href="https://t.me/increatuztv" class="btn tg" target="_blank">Telegram Kanal</a>
        
        <button class="close-btn" onclick="window.Telegram.WebApp.close();">Yopish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.headerColor = '#0f0c29'; /* Tepani fon rangiga moslash */
    </script>
</body>
</html>
