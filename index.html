<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INCREATUZ TV</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { width: 90%; max-width: 350px; text-align: center; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .logo { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px; border: 2px solid #333; }
        h1 { font-size: 22px; margin: 0 0 5px 0; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 15px; text-decoration: none; color: white; font-weight: 600; font-size: 16px; transition: 0.3s; border: none; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
        .yt { background: #ff0000; }
        .ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2397 75%, #bc1888 100%); }
        .tg { background: #0088cc; }
        .close-btn { background: transparent; color: #555; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/150" class="logo" alt="INCREATUZ">
        <h1>INCREATUZ TV</h1>
        <p>Rasmiy sahifalarimiz to'plami</p>
        
        <a href="https://www.youtube.com/@increatuztv" class="btn yt">YouTube</a>
        <a href="https://www.instagram.com/increatuztv" class="btn ig">Instagram</a>
        <a href="https://t.me/increatuztv" class="btn tg">Telegram Kanal</a>
        
        <button class="btn close-btn" onclick="window.Telegram.WebApp.close();">Yopish</button>
    </div>

    <script>
        // Telegram Web App ranglarini moslashtirish
        const tg = window.Telegram.WebApp;
        tg.expand(); // Oynani to'liq ochish
        tg.headerColor = '#000000';
    </script>
</body>
</html>
